name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest tests/ --ignore=tests/integration -q

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Pull simulator images
        run: |
          docker pull aanas0sayed/docker-ltspice:latest
          docker pull aanas0sayed/docker-ngspice:latest

      - name: Run integration tests
        shell: bash
        run: |
          # umask 000: pytest temp dirs/files created world-accessible (0777/0666)
          # so Docker containers running as any uid can read/write them even with
          # --cap-drop=ALL (which removes CAP_DAC_OVERRIDE, preventing uid 0
          # from bypassing file permissions owned by the runner uid).
          umask 000
          uv run pytest tests/integration -v
