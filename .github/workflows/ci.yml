name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest tests/ --ignore=tests/integration -q

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Pull simulator images
        run: |
          docker pull aanas0sayed/docker-ltspice:latest
          docker pull aanas0sayed/docker-ngspice:latest

      - name: Debug Docker volume mount
        shell: bash
        run: |
          mkdir -p /tmp/dockertest
          chmod 777 /tmp/dockertest
          echo "test content" > /tmp/dockertest/hello.txt
          chmod 666 /tmp/dockertest/hello.txt
          echo "=== host: /tmp/dockertest ==="
          ls -la /tmp/dockertest/
          id
          echo "=== container: ngspice as uid 1000, --cap-drop=ALL ==="
          docker run --rm --cap-drop=ALL --user=1000:1000 \
            -v /tmp/dockertest:/sim:rw \
            --entrypoint /bin/sh aanas0sayed/docker-ngspice:latest \
            -c 'id; ls -la /sim/; cat /sim/hello.txt; touch /sim/from-container.txt && echo OK || echo FAIL'
          echo "=== container: ltspice as root, --cap-drop=ALL ==="
          docker run --rm --platform=linux/amd64 --cap-drop=ALL \
            -v /tmp/dockertest:/sim:rw \
            --entrypoint /bin/bash aanas0sayed/docker-ltspice:latest \
            -c 'id; ls -la /sim/; cat /sim/hello.txt; touch /sim/from-ltspice.txt && echo OK || echo FAIL'
          echo "=== host after: /tmp/dockertest ==="
          ls -la /tmp/dockertest/

      - name: Run integration tests
        shell: bash
        run: |
          mkdir -p /tmp/spicemcp-pytest
          chmod 777 /tmp/spicemcp-pytest
          umask 000
          uv run pytest tests/integration -v --basetemp=/tmp/spicemcp-pytest
