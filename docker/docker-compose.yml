# Pull simulator images onto the host:
#   docker compose pull --profile simulators   (Linux / Windows / Intel Mac)
#   docker compose pull --profile macos        (Apple Silicon Mac)

services:
  ltspice:
    image: aanas0sayed/docker-ltspice:latest
    platform: linux/amd64
    profiles: [simulators]
    entrypoint: ["true"]

  ltspice-macos:
    image: aanas0sayed/docker-ltspice:macos-latest
    platform: linux/amd64
    profiles: [macos]
    entrypoint: ["true"]

  ngspice:
    image: aanas0sayed/docker-ngspice:latest
    profiles: [simulators, macos]
    entrypoint: ["true"]
